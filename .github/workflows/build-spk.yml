# Build Synology SPK package from mediaplayer releases
# Follows official Synology Package Developer Guide
# https://help.synology.cn/developer-guide
name: Build SPK

on:
  workflow_dispatch:
    inputs:
      mediaplayer_version:
        description: 'mediaplayer version (e.g. v1.1.10)'
        required: true
        type: string
  push:
    tags:
      - 'v*'

env:
  MEDIAPLAYER_REPO: kuai410022283/mediaplayer
  PACKAGE_NAME: MediaPlayer

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - spk_arch: x86_64
            go_arch: amd64
            arch_family: x86_64
          - spk_arch: x86_64
            go_arch: arm64
            arch_family: aarch64
          - spk_arch: x86_64
            go_arch: arm-armv7l
            arch_family: armv7l

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.mediaplayer_version }}" ]; then
            echo "version=${{ github.event.inputs.mediaplayer_version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Download mediaplayer binary
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          GO_ARCH="${{ matrix.go_arch }}"
          FILENAME="mediaplayer-linux-${GO_ARCH}.tar.gz"
          DOWNLOAD_URL="https://github.com/${MEDIAPLAYER_REPO}/releases/download/${VERSION}/${FILENAME}"

          echo "Downloading: ${DOWNLOAD_URL}"
          curl -fSL -o "${FILENAME}" "${DOWNLOAD_URL}"

          mkdir -p extracted
          tar xzf "${FILENAME}" -C extracted

          BINARY_PATH=$(find extracted -name "mediaplayer" -type f | head -1)
          if [ -z "${BINARY_PATH}" ]; then
            echo "::error::mediaplayer binary not found in archive"
            exit 1
          fi

          mkdir -p src
          cp "${BINARY_PATH}" src/mediaplayer
          chmod +x src/mediaplayer

      - name: Download icons from fnOS project
        run: |
          ICON_SHA="e21eda8d71357fbb57a8d0d689143259f62b8604"
          curl -sL --max-time 30 \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/Brian099/fn_fpk_packages/git/blobs/${ICON_SHA}" \
            -o package/PACKAGE_ICON_256.PNG
          # DSM will auto-resize, use same image for both
          cp package/PACKAGE_ICON_256.PNG package/PACKAGE_ICON.PNG

      - name: Build SPK (official structure)
        id: build_spk
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SPK_VERSION="${VERSION#v}"
          SYNO_ARCH="${{ matrix.spk_arch }}"
          SPK_NAME="${PACKAGE_NAME}-${SYNO_ARCH}-${SPK_VERSION}.spk"

          # ========================================
          # Step 1: Build package.tgz (inner content)
          # ========================================
          PKG_TGZ_DIR="/tmp/_package_tgz"
          rm -rf "${PKG_TGZ_DIR}"
          mkdir -p "${PKG_TGZ_DIR}/bin"
          mkdir -p "${PKG_TGZ_DIR}/etc"

          # Copy binary
          cp src/mediaplayer "${PKG_TGZ_DIR}/bin/"
          chmod +x "${PKG_TGZ_DIR}/bin/mediaplayer"

          # Copy config template
          cp package/conf/config.yaml.template "${PKG_TGZ_DIR}/etc/config.yaml.template"
          cp package/conf/config.yaml.template "${PKG_TGZ_DIR}/etc/config.yaml"

          # Create package.tgz
          cd "${PKG_TGZ_DIR}"
          tar czf "/tmp/package.tgz" .
          cd -

          # ========================================
          # Step 2: Build SPK (outer structure)
          # ========================================
          SPK_DIR="/tmp/_spk"
          rm -rf "${SPK_DIR}"
          mkdir -p "${SPK_DIR}"

          # INFO (required)
          sed -e "s/{{VERSION}}/${SPK_VERSION}/g" \
              -e "s/arch=\"\"/arch=\"${SYNO_ARCH}\"/g" \
              package/INFO > "${SPK_DIR}/INFO"

          # package.tgz (required)
          cp /tmp/package.tgz "${SPK_DIR}/package.tgz"

          # PACKAGE_ICON.PNG (required, 64x64 for DSM 7.0+)
          cp package/PACKAGE_ICON.PNG "${SPK_DIR}/PACKAGE_ICON.PNG"
          # PACKAGE_ICON_256.PNG (required)
          cp package/PACKAGE_ICON_256.PNG "${SPK_DIR}/PACKAGE_ICON_256.PNG"

          # scripts/ (required)
          cp -r package/scripts "${SPK_DIR}/scripts"
          chmod +x "${SPK_DIR}/scripts/"*

          # conf/ (required for DSM 7.0+ - must contain privilege)
          mkdir -p "${SPK_DIR}/conf"
          cp package/spk_conf/privilege "${SPK_DIR}/conf/privilege"

          # WIZARD_UIFILES/ (optional)
          if [ -d package/wizard ] && [ "$(ls -A package/wizard)" ]; then
            mkdir -p "${SPK_DIR}/WIZARD_UIFILES"
            cp package/wizard/* "${SPK_DIR}/WIZARD_UIFILES/"
          fi

          # LICENSE (optional)
          [ -f package/LICENSE ] && cp package/LICENSE "${SPK_DIR}/LICENSE"

          # ========================================
          # Step 3: Create SPK (tar without ./ prefix)
          # ========================================
          # CRITICAL: DSM requires root-level paths (INFO, not ./INFO)
          cd "${SPK_DIR}"
          # List all files to include
          FILES_TO_PACK="INFO package.tgz PACKAGE_ICON.PNG PACKAGE_ICON_256.PNG scripts conf"
          [ -d WIZARD_UIFILES ] && FILES_TO_PACK="${FILES_TO_PACK} WIZARD_UIFILES"
          [ -f LICENSE ] && FILES_TO_PACK="${FILES_TO_PACK} LICENSE"
          tar cf "/tmp/${SPK_NAME}" ${FILES_TO_PACK}
          cd -

          # Verify: check paths don't have ./ prefix
          echo "=== SPK contents ==="
          tar tf "/tmp/${SPK_NAME}"
          echo "=== INFO content ==="
          tar xf "/tmp/${SPK_NAME}" INFO -O

          # Checksum
          sha256sum "/tmp/${SPK_NAME}" > "/tmp/${SPK_NAME}.sha256"

          echo "spk_path=/tmp/${SPK_NAME}" >> $GITHUB_OUTPUT
          echo "spk_name=${SPK_NAME}" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.arch_family }}-spk
          path: |
            ${{ steps.build_spk.outputs.spk_path }}
            ${{ steps.build_spk.outputs.spk_path }}.sha256
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Determine release tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.mediaplayer_version }}" ]; then
            echo "tag=spk-${{ github.event.inputs.mediaplayer_version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "SPK ${{ steps.tag.outputs.tag }}"
          body: |
            Synology SPK packages for MediaPlayer ${{ steps.tag.outputs.tag }}

            ### Supported Architectures
            | Architecture | File | Synology Models |
            |---|---|---|
            | x86_64 | `MediaPlayer-x86_64-*.spk` | DS918+, DS920+, DS1522+, DS720+, DS923+, etc. |
            | aarch64 | `MediaPlayer-aarch64-*.spk` | DS220+, DS723+, RS822+, etc. |
            | armv7l | `MediaPlayer-armv7l-*.spk` | Older ARM models (DS216, etc.) |

            ### Installation
            1. Download the SPK for your NAS architecture
            2. Open Synology DSM → Package Center → Manual Install
            3. Select the downloaded .spk file
            4. Follow the installation wizard
          files: |
            artifacts/**/*.spk
            artifacts/**/*.sha256
          draft: false
          prerelease: false