# Check upstream mediaplayer repo for new releases
# If a new version is found, trigger the build-spk workflow
name: Check Upstream

on:
  schedule:
    # Daily at UTC 06:00 (14:00 Beijing Time)
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  UPSTREAM_REPO: kuai410022283/mediaplayer

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.check.outputs.new_version }}
      version: ${{ steps.check.outputs.version }}
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check latest upstream release
        id: check
        run: |
          # Get latest release from upstream repo
          LATEST=$(curl -s "https://api.github.com/repos/${UPSTREAM_REPO}/releases/latest" | \
            python3 -c "import sys,json; print(json.load(sys.stdin).get('tag_name',''))")

          if [ -z "${LATEST}" ]; then
            echo "::error::Failed to fetch upstream release info"
            exit 1
          fi

          echo "Upstream latest: ${LATEST}"

          # Check if we already have a corresponding release
          EXISTING=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/tags/spk-${LATEST}" | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('tag_name',''))" 2>/dev/null || echo "")

          if [ "${EXISTING}" = "spk-${LATEST}" ]; then
            echo "SPK for ${LATEST} already exists. Skipping."
            echo "new_version=false" >> $GITHUB_OUTPUT
          else
            echo "New version detected: ${LATEST}"
            echo "new_version=true" >> $GITHUB_OUTPUT
            echo "version=${LATEST}" >> $GITHUB_OUTPUT
          fi

  build_spk:
    needs: check
    if: needs.check.outputs.new_version == 'true'
    uses: ./.github/workflows/build-spk.yml
    with:
      mediaplayer_version: ${{ needs.check.outputs.version }}
    secrets: inherit