# Check upstream mediaplayer repo for new releases
# If a new version is found, trigger the build-spk workflow
name: Check Upstream

on:
  schedule:
    # Daily at UTC 06:00 (14:00 Beijing Time)
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  UPSTREAM_REPO: kuai410022283/mediaplayer

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check latest upstream release
        id: check
        run: |
          # Get latest release from upstream repo
          LATEST=$(curl -s "https://api.github.com/repos/${UPSTREAM_REPO}/releases/latest" | \
            python3 -c "import sys,json; print(json.load(sys.stdin).get('tag_name',''))")

          if [ -z "${LATEST}" ]; then
            echo "::error::Failed to fetch upstream release info"
            exit 1
          fi

          echo "Upstream latest: ${LATEST}"

          # =========================================================================
          # 【正式上线前可取消注释下方校验逻辑】
          # 判断本仓库是否已经发布过该 Tag，避免每天重复编译与覆盖 Release。
          # 调试阶段保持注释状态，以允许重新打包覆盖 Tag 产物。
          # =========================================================================
          # IS_RELEASED=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          #   "https://api.github.com/repos/${{ github.repository }}/releases/tags/${LATEST}" | \
          #   python3 -c "import sys,json; print('yes' if json.load(sys.stdin).get('tag_name') else 'no')")
          #
          # if [ "${IS_RELEASED}" = "yes" ] && [ "${{ github.event_name }}" = "schedule" ]; then
          #   echo "Release ${LATEST} already exists on this repository. Skipping build."
          #   exit 0
          # fi
          # =========================================================================

          echo "Triggering build for version: ${LATEST}"
          echo "version=${LATEST}" >> $GITHUB_OUTPUT

  build_spk:
    needs: check
    uses: ./.github/workflows/build-spk.yml
    with:
      mediaplayer_version: ${{ needs.check.outputs.version }}
    secrets: inherit