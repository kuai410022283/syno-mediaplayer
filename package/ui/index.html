<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>MediaPlayer Loading...</title>
</head>
<body>
    <script>
        // postinst 安装时，会把下方的 {{PORT}} 替换成真实端口（如 5035）
        var port = "{{PORT}}";
        
        // 强制使用 HTTP（因为 MediaPlayer 默认不开启 HTTPS）
        var targetUrl = "http://" + window.location.hostname + ":" + port + "/admin";
        
        // 自动跳转：替换当前整个浏览器窗口的地址，实现无缝自动跳转
        window.top.location.href = targetUrl;

    </script>
</body>
</html>
