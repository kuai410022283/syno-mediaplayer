<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>MediaPlayer</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; }
        a.btn { display: inline-block; padding: 15px 30px; background: #007bff; color: white; text-decoration: none; border-radius: 5px; font-size: 18px; }
        a.btn:hover { background: #0056b3; }
    </style>
</head>
<body>
    <h2>正在跳转到 MediaPlayer 管理面板...</h2>
    <p>如果浏览器拦截了自动跳转，请点击下方按钮：</p>
    <a href="#" id="link" class="btn" target="_blank">进入后台管理面板</a>
    <script>
        var port = 9527;
        var targetUrl = "http://" + window.location.hostname + ":" + port + "/admin";
        document.getElementById("link").href = targetUrl;
        
        // 尝试突破 iframe 在新标签页打开
        var newWin = window.open(targetUrl, "_blank");
        if(!newWin || newWin.closed || typeof newWin.closed=='undefined') {
            // 被拦截，只能等待用户手动点击
            console.log("Popup blocked");
        } else {
            // 成功打开新标签页，关闭当前弹窗
            setTimeout(function(){ window.close(); }, 500);
        }
    </script>
</body>
</html>
