# MediaPlayer 配置文件
# ⚠️ 部署前必须修改 auth.secret 和 auth.admin_password

server:
  host: "0.0.0.0"
  port: 9527

database:
  path: "/var/packages/MediaPlayer/target/var/mediaplayer.db"

stream:
  cache_dir: "/var/packages/MediaPlayer/target/var/cache"
  max_concurrent: 1000       # 最大并发流数
  buffer_size: 8192          # 流缓冲区大小 (bytes)

auth:
  # ⚠️ 必须修改！使用随机生成的长字符串
  # 生成方法: openssl rand -hex 32
  secret: "mediaplayer-change-this-secret-key"
  expire_hours: 720          # JWT Token 有效期 (小时)
  # ⚠️ 必须修改！设置强密码
  admin_password: "admin123"

cors:
  allowed_origins:
    - "*"

# IP 级请求频率限制 (次/分钟/IP)
rate_limit:
  api: 1000          # 通用 API
  logo: 1000         # 台标接口
  stream: 2000       # 流代理接口
